# pkgdown configuration file

url: https://Zepeng-Mu.github.io/vibeColors/

template:
  package: vibeColors
  bootstrap: 5
  bslib:
    primary: "#6C5CE7"
    navbar-bg: "#6C5CE7"
    font_scale: 1

home:
  title: vibeColors
  description: >
    A collection of color palettes designed for use with ggplot2.
    Provides discrete and continuous color scales that integrate seamlessly
    with the ggplot2 plotting system.
  links:
    - text: GitHub
      href: https://github.com/Zepeng-Mu/vibeColors
    - text: Report a bug
      href: https://github.com/Zepeng-Mu/vibeColors/issues

reference:
  - title: "Palette Access"
    desc: "Functions to retrieve and list palettes"
    contents:
      - vibe_palette
      - vibe_color
      - list_vibe_palettes
      - view_vibe_palettes
  - title: "ggplot2 Scales"
    desc: "Discrete and continuous color scales for ggplot2"
    contents:
      - scale_color_vibe
      - scale_fill_vibe
      - scale_color_vibe_c
      - scale_fill_vibe_c
  - title: "Data"
    desc: "Palette data objects"
    contents:
      - vibe_palettes

articles:
  - title: Guides and Tutorials
    desc: Learn how to use vibeColors in your projects
    contents:
    - vibeColors
    - creating-palettes

authors:
  title: Authors
  desc: >
    vibeColors is authored by maintainers who are passionate about
    data visualization and color theory.
  footer: >
    <p>This site is built with <a href="https://pkgdown.r-lib.org/">pkgdown</a>.</p>

navbar:
  type: default
  structure:
    left:
      - home
      - reference
      - articles
      - news
    right:
      - github
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/Zepeng-Mu/vibeColors

development:
  mode: auto
  version_label: default
